<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIT RUNNER — The Soul of a Computer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box }
        body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh }
        canvas { display: block; width: 100vw; height: 100vh }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        // ── Audio ──────────────────────────────────────────────────────────────────
        const AC = new (window.AudioContext || window.webkitAudioContext)();
        function beep(freq, type, dur, vol = 0.18, delay = 0) {
            try {
                const o = AC.createOscillator(), g = AC.createGain();
                o.connect(g); g.connect(AC.destination);
                o.type = type; o.frequency.value = freq;
                g.gain.setValueAtTime(vol, AC.currentTime + delay);
                g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + delay + dur);
                o.start(AC.currentTime + delay); o.stop(AC.currentTime + delay + dur);
            } catch(e) {}
        }
        function jumpSound() { beep(220, 'square', 0.08, 0.12); beep(440, 'square', 0.08, 0.10, 0.05); }
        function deathSound() { [200, 160, 120, 80].forEach((f, i) => beep(f, 'sawtooth', 0.12, 0.15, i * 0.1)); }
        function powerSound() { [300, 400, 500, 600].forEach((f, i) => beep(f, 'triangle', 0.1, 0.2, i * 0.07)); }
        function checkpointSound() { [440, 550, 660, 880].forEach((f, i) => beep(f, 'square', 0.1, 0.15, i * 0.08)); }
        function eraSound() { [200, 250, 300, 400, 500].forEach((f, i) => beep(f, 'triangle', 0.15, 0.2, i * 0.1)); }
        function bgHum(era) {
            const freqs = [[60,3],[80,5],[55,7],[100,4],[70,4],[85,5],[65,6],[110,3]];
            const [f, d] = freqs[era % 8] || [60, 3];
            beep(f, 'sine', d, 0.04);
        }

        // ── Resize ────────────────────────────────────────────────────────────────
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        // ── Era Definitions ───────────────────────────────────────────────────────
        const ERAS = [
            {
                id: 0, name: '1946 · ENIAC', shortName: 'ENIAC',
                bgTop: '#1a0800', bgMid: '#3d1200', bgBot: '#1a0800',
                groundCol: '#4a2000', groundLine: '#ff8c00',
                glowCol: '#ff6600', playerCol: '#ffa040', trailCol: '#ff4400',
                obstacleCol: '#cc5500', obstacleCol2: '#ffaa00',
                powerName: 'ENIAC BOOST', powerColor: '#ffcc00',
                flyerLabel: 'VACUUM TUBE', flyerEmoji: '⊘',
                speed: 4, scoreGoal: 800,
                bgImage: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1920&q=80'
            },
            {
                id: 1, name: '1956 · TRANSISTOR', shortName: 'TRANSISTOR',
                bgTop: '#050a14', bgMid: '#0a1428', bgBot: '#050a14',
                groundCol: '#1a1a2e', groundLine: '#4488ff',
                glowCol: '#2266cc', playerCol: '#44aaff', trailCol: '#0044cc',
                obstacleCol: '#334466', obstacleCol2: '#6699ff',
                powerName: 'TRANSISTOR SHIELD', powerColor: '#00ffff',
                flyerLabel: 'TRANSISTOR', flyerEmoji: '△',
                speed: 5, scoreGoal: 1600,
                bgImage: 'https://images.unsplash.com/photo-1517077304055-6e89abbf09b0?w=1920&q=80'
            },
            {
                id: 2, name: '1969 · ARPANET', shortName: 'ARPANET',
                bgTop: '#0a0f00', bgMid: '#1a2800', bgBot: '#0a0f00',
                groundCol: '#1a2800', groundLine: '#aacc00',
                glowCol: '#88aa00', playerCol: '#aad400', trailCol: '#446600',
                obstacleCol: '#334400', obstacleCol2: '#ccee00',
                powerName: 'PACKET BOOST', powerColor: '#00ffaa',
                flyerLabel: 'DATA PACKET', flyerEmoji: '◇',
                speed: 6, scoreGoal: 2400,
                bgImage: 'https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=1920&q=80'
            },
            {
                id: 3, name: '1975 · MICROCHIP', shortName: 'MICROCHIP',
                bgTop: '#001400', bgMid: '#002800', bgBot: '#001400',
                groundCol: '#002200', groundLine: '#00ff44',
                glowCol: '#00cc44', playerCol: '#00ff66', trailCol: '#006622',
                obstacleCol: '#004422', obstacleCol2: '#00ff88',
                powerName: "MOORE'S LAW", powerColor: '#88ff00',
                flyerLabel: 'SILICON CHIP', flyerEmoji: '▣',
                speed: 7, scoreGoal: 3200,
                bgImage: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1920&q=80'
            },
            {
                id: 4, name: '1985 · PC ERA', shortName: 'PC ERA',
                bgTop: '#0d0d1a', bgMid: '#1a1a33', bgBot: '#0d0d1a',
                groundCol: '#1a1a2e', groundLine: '#ff00ff',
                glowCol: '#ff00ff', playerCol: '#ff66ff', trailCol: '#aa00aa',
                obstacleCol: '#660066', obstacleCol2: '#ff44ff',
                powerName: 'BOOT DISK', powerColor: '#ff88ff',
                flyerLabel: 'FLOPPY DISK', flyerEmoji: '▫',
                speed: 8, scoreGoal: 4000,
                bgImage: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1920&q=80'
            },
            {
                id: 5, name: '1995 · INTERNET', shortName: 'INTERNET',
                bgTop: '#000a14', bgMid: '#001428', bgBot: '#000a14',
                groundCol: '#001428', groundLine: '#0088ff',
                glowCol: '#0066cc', playerCol: '#44aaff', trailCol: '#0044aa',
                obstacleCol: '#003366', obstacleCol2: '#0099ff',
                powerName: 'BROADBAND', powerColor: '#00ccff',
                flyerLabel: 'SPAM EMAIL', flyerEmoji: '@',
                speed: 9, scoreGoal: 4800,
                bgImage: 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80'
            },
            {
                id: 6, name: '2007 · MOBILE', shortName: 'MOBILE',
                bgTop: '#0a0014', bgMid: '#140028', bgBot: '#0a0014',
                groundCol: '#140028', groundLine: '#aa44ff',
                glowCol: '#8800ff', playerCol: '#cc66ff', trailCol: '#660099',
                obstacleCol: '#440066', obstacleCol2: '#bb44ff',
                powerName: '4G SIGNAL', powerColor: '#dd88ff',
                flyerLabel: 'PUSH NOTIF', flyerEmoji: '🔔',
                speed: 10, scoreGoal: 5600,
                bgImage: 'https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?w=1920&q=80'
            },
            {
                id: 7, name: '2020 · AI ERA', shortName: 'AI ERA',
                bgTop: '#000814', bgMid: '#001428', bgBot: '#000814',
                groundCol: '#001428', groundLine: '#00ffee',
                glowCol: '#00ffcc', playerCol: '#00ffee', trailCol: '#009988',
                obstacleCol: '#004444', obstacleCol2: '#00ffcc',
                powerName: 'GPT BURST', powerColor: '#00ffaa',
                flyerLabel: 'NEURAL NODE', flyerEmoji: '⬡',
                speed: 12, scoreGoal: 6400,
                bgImage: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=1920&q=80'
            }
        ];

        // ── Preload Background Images ─────────────────────────────────────────────
        const bgImages = {};
        let imagesLoaded = 0;
        ERAS.forEach((e, i) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => { imagesLoaded++; };
            img.onerror = () => { imagesLoaded++; };
            img.src = e.bgImage;
            bgImages[i] = img;
        });

        // Background transition state
        let bgFadeAlpha = 0;
        let bgFadeFrom = 0;
        let bgFadeTo = 0;
        let bgFading = false;

        // ── Game State ────────────────────────────────────────────────────────────
        let era = 0, eraObj = ERAS[0];
        let gameState = 'title';
        let score = 0, lives = 3, frame = 0;
        let checkpointReached = false;
        let kernelPanic = false;
        let currentSpeed = 0;
        let transitionTimer = 0, transitionNextEra = 0;
        let deathTimer = 0;
        let bgHumTimer = 0;

        // ── Ground ────────────────────────────────────────────────────────────────
        const GROUND_H = () => Math.floor(canvas.height * 0.12);
        const GROUND_Y = () => canvas.height - GROUND_H();

        // ── Player (FREE MOVEMENT) ────────────────────────────────────────────────
        const PLAYER_SPEED = 5;
        const player = {
            x: 0, y: 0, r: 18,
            dead: false, invincible: false, invTimer: 0,
            shield: false, shieldTimer: 0,
            speedBoost: false, speedTimer: 0,
            scoreDouble: false, doubleTimer: 0,
            tunneling: false, tunnelTimer: 0, tunnelCooldown: 0,
            agActive: false, agTimer: 0, agCooldown: 0,
            trail: [],
            init() {
                this.x = canvas.width * 0.18;
                this.y = GROUND_Y() - this.r - 40;
                this.dead = false; this.invincible = false; this.invTimer = 0;
                this.shield = false; this.shieldTimer = 0;
                this.speedBoost = false; this.speedTimer = 0;
                this.scoreDouble = false; this.doubleTimer = 0;
                this.agActive = false; this.agTimer = 0; this.agCooldown = 0;
                this.tunneling = false; this.tunnelTimer = 0; this.tunnelCooldown = 0;
                this.trail = [];
            },
            update() {
                if (this.dead) return;
                // powerup timers
                if (this.invincible) { this.invTimer--; if (this.invTimer <= 0) this.invincible = false; }
                if (this.shield) { this.shieldTimer--; if (this.shieldTimer <= 0) this.shield = false; }
                if (this.speedBoost) { this.speedTimer--; if (this.speedTimer <= 0) this.speedBoost = false; }
                if (this.scoreDouble) { this.doubleTimer--; if (this.doubleTimer <= 0) this.scoreDouble = false; }
                if (this.tunneling) { this.tunnelTimer--; this.invincible = true; if (this.tunnelTimer <= 0) { this.tunneling = false; this.invincible = false; this.tunnelCooldown = 900; } }
                if (this.tunnelCooldown > 0) this.tunnelCooldown--;

                // FREE MOVEMENT — arrow keys
                const spd = PLAYER_SPEED + (this.speedBoost ? 3 : 0);
                if (keys['ArrowUp'])    this.y -= spd;
                if (keys['ArrowDown'])  this.y += spd;
                if (keys['ArrowLeft'])  this.x -= spd;
                if (keys['ArrowRight']) this.x += spd;

                // Clamp to screen bounds
                const minY = this.r + 4;
                const maxY = GROUND_Y() - this.r;
                const minX = this.r;
                const maxX = canvas.width - this.r;
                if (this.y < minY) this.y = minY;
                if (this.y > maxY) this.y = maxY;
                if (this.x < minX) this.x = minX;
                if (this.x > maxX) this.x = maxX;

                // trail
                this.trail.push({ x: this.x, y: this.y, a: 0.7 });
                if (this.trail.length > 14) this.trail.shift();
                this.trail.forEach(t => t.a -= 0.05);
            },
            draw() {
                if (this.dead) return;
                const e = eraObj;
                // trail
                this.trail.forEach((t, i) => {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, t.a * (i / this.trail.length)) * (this.tunneling ? 0.3 : 1);
                    ctx.fillStyle = e.trailCol;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.r * (i / this.trail.length) * 0.8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
                // shield
                if (this.shield) {
                    ctx.save();
                    ctx.strokeStyle = '#00ffff';
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 20;
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(frame * 0.2);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r + 8, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                // invincibility flash
                if (this.invincible && frame % 6 < 3) return;
                // glow layers
                const pulse = 0.8 + 0.2 * Math.sin(frame * 0.15);
                [this.r * 2.5, this.r * 1.6, this.r].forEach((rad, i) => {
                    ctx.save();
                    ctx.globalAlpha = [0.08, 0.15, 1][i] * pulse * (this.tunneling ? 0.3 : 1);
                    ctx.fillStyle = i === 2 ? (this.agActive ? '#ffd700' : e.playerCol) : (this.agActive ? '#ccaa00' : e.glowCol);
                    ctx.shadowColor = this.agActive ? '#ffaa00' : e.glowCol;
                    ctx.shadowBlur = i === 2 ? 20 : 0;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, rad, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
                // electron orbit
                const angle = frame * 0.08;
                ctx.save();
                ctx.globalAlpha = 0.9;
                ctx.strokeStyle = e.glowCol;
                ctx.lineWidth = 1;
                ctx.shadowColor = e.glowCol;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.r * 1.3, this.r * 0.5, angle, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x + Math.cos(angle) * this.r * 1.3, this.y + Math.sin(angle) * this.r * 0.5, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // tunneling indicator
                if (this.tunneling) {
                    ctx.save();
                    ctx.fillStyle = '#ff00ff';
                    ctx.shadowColor = '#ff00ff';
                    ctx.shadowBlur = 15;
                    ctx.font = `bold ${scaledFont(14)}px "Orbitron", sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('⟐ QUANTUM ⟐', this.x, this.y - this.r - 12);
                    ctx.restore();
                }
            }
        };

        // ── Scaled Font Helper ────────────────────────────────────────────────────
        function scaledFont(base) {
            return Math.max(base, Math.floor(base * (canvas.width / 1200)));
        }

        // ── Particles ─────────────────────────────────────────────────────────────
        let particles = [];
        function spawnParticles(x, y, count, col, type) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * (type === 'power' ? 8 : 4),
                    vy: (Math.random() - 0.5) * (type === 'power' ? 8 : 4) - (type === 'jump' ? 3 : 0),
                    r: 1 + Math.random() * 3, a: 1, col, da: 0.015 + Math.random() * 0.02
                });
            }
        }
        function updateParticles() { particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.a -= p.da; }); particles = particles.filter(p => p.a > 0); }
        function drawParticles() {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.a;
                ctx.fillStyle = p.col;
                ctx.shadowColor = p.col;
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // ── Obstacles ─────────────────────────────────────────────────────────────
        let obstacles = [];
        let scrollX = 0;

        function spawnObstacle() {
            const e = eraObj;
            const gy = GROUND_Y();
            const types = {
                0: () => { const h = 50 + Math.random() * 60; return { type: 'tube', x: canvas.width + 60, y: gy - h, w: 24, h, col: e.obstacleCol, col2: e.obstacleCol2 }; },
                1: () => { const h = 80 + Math.random() * 40, gap = 70 + Math.random() * 30; return { type: 'gate', x: canvas.width + 60, y: 0, w: 32, h: canvas.height, gap, gapY: gy - h - gap, col: e.obstacleCol, col2: e.obstacleCol2, open: false, timer: 0 }; },
                2: () => { const flyHigh = Math.random() < 0.4; return { type: 'packet', x: canvas.width + 60, y: flyHigh ? gy * 0.3 : gy - 50, w: 40, h: 22, col: e.obstacleCol, col2: e.obstacleCol2, vy: flyHigh ? (Math.random() - 0.5) * 2 : 0 }; },
                3: () => { const gap = 90; const gapY = 100 + Math.random() * (canvas.height - 300); return { type: 'wall', x: canvas.width + 60, y: 0, w: 28, h: canvas.height, gap, gapY, col: e.obstacleCol, col2: e.obstacleCol2, open: false, timer: 0 }; }
            };
            obstacles.push(types[era % 4]());
        }

        function spawnFlyer() {
            const e = eraObj;
            const gy = GROUND_Y();
            const flyY = 50 + Math.random() * (gy * 0.55);
            const size = 30 + Math.random() * 14;
            obstacles.push({
                type: 'flyer', x: canvas.width + 80, y: flyY, baseY: flyY,
                w: size, h: size, r: size / 2,
                col: e.obstacleCol, col2: e.obstacleCol2,
                amp: 25 + Math.random() * 45,
                freq: 0.018 + Math.random() * 0.022,
                phase: Math.random() * Math.PI * 2,
                eraId: era,
                spdMult: 0.7 + Math.random() * 0.6,
                rot: 0, rotSpeed: (Math.random() - 0.5) * 0.04
            });
        }

        function updateObstacles() {
            obstacles.forEach(ob => {
                if (ob.type === 'flyer') {
                    ob.x -= currentSpeed * ob.spdMult;
                    ob.y = ob.baseY + Math.sin(frame * ob.freq + ob.phase) * ob.amp;
                    ob.rot += ob.rotSpeed;
                } else {
                    ob.x -= currentSpeed;
                }
                if (ob.type === 'gate' || ob.type === 'wall') { ob.timer++; ob.open = (ob.timer % 120) < 50; }
                if (ob.type === 'packet') ob.y += (ob.vy || 0);
            });
            obstacles = obstacles.filter(ob => ob.x > -120);
        }

        function drawFlyerShape(ob) {
            ctx.save();
            const cx = ob.x + ob.w / 2, cy = ob.y + ob.h / 2;
            const e = ERAS[ob.eraId] || eraObj;
            const r = ob.w / 2;
            ctx.translate(cx, cy);
            ctx.rotate(ob.rot);
            ctx.shadowColor = e.obstacleCol2;
            ctx.shadowBlur = 16;

            switch (ob.eraId) {
                case 0: // ENIAC — Vacuum Tube
                    ctx.fillStyle = e.obstacleCol2; ctx.globalAlpha = 0.55;
                    ctx.beginPath(); ctx.ellipse(0, 0, r * 0.55, r, 0, 0, Math.PI * 2); ctx.fill();
                    ctx.globalAlpha = 1; ctx.strokeStyle = '#ff8c00'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(-3, r * 0.4); ctx.lineTo(0, -r * 0.3); ctx.lineTo(3, r * 0.3); ctx.stroke();
                    ctx.strokeStyle = e.obstacleCol; ctx.lineWidth = 1.5;
                    for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(i * 3, r); ctx.lineTo(i * 3, r + 6); ctx.stroke(); }
                    // warm glow
                    const tg = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.5);
                    tg.addColorStop(0, 'rgba(255,140,0,0.35)'); tg.addColorStop(1, 'rgba(255,140,0,0)');
                    ctx.fillStyle = tg; ctx.beginPath(); ctx.arc(0, 0, r * 0.5, 0, Math.PI * 2); ctx.fill();
                    break;
                case 1: // TRANSISTOR — Triangle component
                    ctx.fillStyle = e.obstacleCol;
                    ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r, r * 0.7); ctx.lineTo(-r, r * 0.7); ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = e.obstacleCol2; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(-r * 0.4, r * 0.7); ctx.lineTo(-r * 0.4, r * 1.2);
                    ctx.moveTo(0, r * 0.7); ctx.lineTo(0, r * 1.2);
                    ctx.moveTo(r * 0.4, r * 0.7); ctx.lineTo(r * 0.4, r * 1.2);
                    ctx.stroke();
                    // circuit glow
                    ctx.fillStyle = e.obstacleCol2; ctx.globalAlpha = 0.4;
                    ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.2, 0, Math.PI * 2); ctx.fill();
                    break;
                case 2: // ARPANET — Data Packet diamond
                    ctx.fillStyle = e.obstacleCol;
                    ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = e.obstacleCol2; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = e.obstacleCol2; ctx.globalAlpha = 0.9;
                    ctx.font = `bold ${Math.max(8, r * 0.5)}px monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('01', 0, 0);
                    // data stream trail
                    ctx.globalAlpha = 0.2; ctx.fillStyle = e.obstacleCol2;
                    for (let i = 1; i <= 3; i++) { ctx.fillRect(r + i * 8, -2, 5, 4); }
                    break;
                case 3: // MICROCHIP — IC with pins
                    ctx.fillStyle = e.obstacleCol;
                    ctx.fillRect(-r * 0.65, -r * 0.65, r * 1.3, r * 1.3);
                    ctx.strokeStyle = e.obstacleCol2; ctx.lineWidth = 1.5;
                    ctx.strokeRect(-r * 0.65, -r * 0.65, r * 1.3, r * 1.3);
                    for (let i = -1; i <= 1; i++) {
                        ctx.beginPath();
                        ctx.moveTo(i * r * 0.35, -r * 0.65); ctx.lineTo(i * r * 0.35, -r * 1.0);
                        ctx.moveTo(i * r * 0.35, r * 0.65); ctx.lineTo(i * r * 0.35, r * 1.0);
                        ctx.moveTo(-r * 0.65, i * r * 0.35); ctx.lineTo(-r * 1.0, i * r * 0.35);
                        ctx.moveTo(r * 0.65, i * r * 0.35); ctx.lineTo(r * 1.0, i * r * 0.35);
                        ctx.stroke();
                    }
                    // die mark
                    ctx.fillStyle = e.obstacleCol2; ctx.globalAlpha = 0.3;
                    ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.3, r * 0.12, 0, Math.PI * 2); ctx.fill();
                    break;
                case 4: // PC ERA — Floppy Disk
                    ctx.fillStyle = e.obstacleCol;
                    ctx.fillRect(-r * 0.8, -r * 0.85, r * 1.6, r * 1.7);
                    ctx.strokeStyle = e.obstacleCol2; ctx.lineWidth = 1.5;
                    ctx.strokeRect(-r * 0.8, -r * 0.85, r * 1.6, r * 1.7);
                    // metal slider
                    ctx.fillStyle = e.obstacleCol2; ctx.globalAlpha = 0.5;
                    ctx.fillRect(-r * 0.3, -r * 0.85, r * 0.6, r * 0.45);
                    // label area
                    ctx.globalAlpha = 0.25;
                    ctx.fillRect(-r * 0.55, r * 0.05, r * 1.1, r * 0.6);
                    // label text
                    ctx.globalAlpha = 0.6; ctx.fillStyle = e.obstacleCol2;
                    ctx.font = `${Math.max(6, r * 0.3)}px monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('3.5"', 0, r * 0.35);
                    break;
                case 5: // INTERNET — Spam Email / @ symbol
                    ctx.fillStyle = e.obstacleCol;
                    ctx.fillRect(-r * 0.85, -r * 0.6, r * 1.7, r * 1.2);
                    ctx.strokeStyle = e.obstacleCol2; ctx.lineWidth = 1.5;
                    ctx.strokeRect(-r * 0.85, -r * 0.6, r * 1.7, r * 1.2);
                    // envelope flap
                    ctx.beginPath(); ctx.moveTo(-r * 0.85, -r * 0.6); ctx.lineTo(0, r * 0.1); ctx.lineTo(r * 0.85, -r * 0.6); ctx.stroke();
                    // @ symbol
                    ctx.fillStyle = e.obstacleCol2; ctx.globalAlpha = 0.8;
                    ctx.font = `bold ${Math.max(10, r * 0.8)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('@', 0, r * 0.15);
                    break;
                case 6: // MOBILE — Push Notification bubble
                    // Rounded rectangle body
                    const bw = r * 1.6, bh = r * 1.0;
                    ctx.fillStyle = e.obstacleCol; ctx.beginPath();
                    ctx.moveTo(-bw / 2 + 4, -bh / 2); ctx.lineTo(bw / 2 - 4, -bh / 2);
                    ctx.quadraticCurveTo(bw / 2, -bh / 2, bw / 2, -bh / 2 + 4);
                    ctx.lineTo(bw / 2, bh / 2 - 4);
                    ctx.quadraticCurveTo(bw / 2, bh / 2, bw / 2 - 4, bh / 2);
                    ctx.lineTo(-bw / 2 + 4, bh / 2);
                    ctx.quadraticCurveTo(-bw / 2, bh / 2, -bw / 2, bh / 2 - 4);
                    ctx.lineTo(-bw / 2, -bh / 2 + 4);
                    ctx.quadraticCurveTo(-bw / 2, -bh / 2, -bw / 2 + 4, -bh / 2);
                    ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = e.obstacleCol2; ctx.lineWidth = 2; ctx.stroke();
                    // red notification badge
                    ctx.fillStyle = '#ff2244'; ctx.globalAlpha = 0.9;
                    ctx.beginPath(); ctx.arc(bw / 2 - 2, -bh / 2, r * 0.22, 0, Math.PI * 2); ctx.fill();
                    // text lines
                    ctx.fillStyle = e.obstacleCol2; ctx.globalAlpha = 0.4;
                    ctx.fillRect(-bw / 2 + 6, -2, bw - 16, 2);
                    ctx.fillRect(-bw / 2 + 6, 4, bw * 0.5, 2);
                    break;
                case 7: // AI ERA — Neural Network Node
                    // Central node
                    ctx.fillStyle = e.obstacleCol; ctx.beginPath(); ctx.arc(0, 0, r * 0.4, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = e.obstacleCol2; ctx.lineWidth = 2; ctx.stroke();
                    // Connection spokes + outer nodes
                    for (let a = 0; a < 6; a++) {
                        const ang = (a / 6) * Math.PI * 2 + frame * 0.015;
                        const ex = Math.cos(ang) * r * 0.9, ey = Math.sin(ang) * r * 0.9;
                        ctx.strokeStyle = e.obstacleCol2; ctx.globalAlpha = 0.5; ctx.lineWidth = 1;
                        ctx.beginPath(); ctx.moveTo(Math.cos(ang) * r * 0.4, Math.sin(ang) * r * 0.4); ctx.lineTo(ex, ey); ctx.stroke();
                        ctx.globalAlpha = 0.8; ctx.fillStyle = e.obstacleCol2;
                        ctx.beginPath(); ctx.arc(ex, ey, r * 0.14, 0, Math.PI * 2); ctx.fill();
                    }
                    // pulsing core
                    const pg = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.35);
                    pg.addColorStop(0, e.obstacleCol2); pg.addColorStop(1, 'transparent');
                    ctx.globalAlpha = 0.3 + 0.2 * Math.sin(frame * 0.1);
                    ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2); ctx.fill();
                    break;
            }

            // Label below the flyer
            ctx.rotate(-ob.rot); // un-rotate for text
            ctx.globalAlpha = 0.6;
            ctx.fillStyle = e.obstacleCol2;
            ctx.font = `${Math.max(7, r * 0.35)}px "Orbitron", sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText(e.flyerLabel || '', 0, r + 4);
            ctx.restore();
        }

        function drawObstacles() {
            obstacles.forEach(ob => {
                if (ob.type === 'flyer') { drawFlyerShape(ob); return; }
                ctx.save();
                ctx.shadowColor = ob.col2;
                ctx.shadowBlur = 10;
                if (ob.type === 'tube') {
                    ctx.fillStyle = ob.col;
                    ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
                    ctx.fillStyle = ob.col2;
                    ctx.globalAlpha = 0.7;
                    ctx.beginPath();
                    ctx.arc(ob.x + ob.w / 2, ob.y, ob.w / 2, Math.PI, 0);
                    ctx.fill();
                } else if (ob.type === 'gate') {
                    ctx.fillStyle = ob.col;
                    ctx.fillRect(ob.x, 0, ob.w, ob.gapY);
                    ctx.fillRect(ob.x, ob.gapY + ob.gap, ob.w, canvas.height - ob.gapY - ob.gap);
                    ctx.fillStyle = ob.col2;
                    ctx.globalAlpha = 0.4;
                    ctx.fillRect(ob.x, ob.gapY, ob.w, ob.gap);
                } else if (ob.type === 'packet') {
                    ctx.fillStyle = ob.col;
                    ctx.fillRect(ob.x, ob.y, ob.w, ob.h);
                    ctx.strokeStyle = ob.col2;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(ob.x, ob.y, ob.w, ob.h);
                } else if (ob.type === 'wall') {
                    ctx.fillStyle = ob.col;
                    ctx.fillRect(ob.x, 0, ob.w, ob.gapY);
                    ctx.fillRect(ob.x, ob.gapY + ob.gap, ob.w, canvas.height - ob.gapY - ob.gap);
                    ctx.strokeStyle = ob.col2;
                    ctx.lineWidth = 1;
                    for (let sy = 0; sy < canvas.height; sy += 20) { ctx.beginPath(); ctx.moveTo(ob.x, sy); ctx.lineTo(ob.x + ob.w, sy); ctx.stroke(); }
                }
                ctx.restore();
            });
        }

        function collides(ob) {
            const px = player.x, py = player.y, pr = player.r;
            if (ob.type === 'flyer') {
                const dx = px - (ob.x + ob.w / 2), dy = py - (ob.y + ob.h / 2);
                return Math.sqrt(dx * dx + dy * dy) < pr + ob.r * 0.7;
            }
            if (ob.type === 'tube') return px + pr > ob.x && px - pr < ob.x + ob.w && py + pr > ob.y && py - pr < ob.y + ob.h;
            if (ob.type === 'gate') return px + pr > ob.x && px - pr < ob.x + ob.w && (py - pr < ob.gapY || py + pr > ob.gapY + ob.gap);
            if (ob.type === 'packet') return px + pr > ob.x && px - pr < ob.x + ob.w && py + pr > ob.y && py - pr < ob.y + ob.h;
            if (ob.type === 'wall') return px + pr > ob.x && px - pr < ob.x + ob.w && (py - pr < ob.gapY || py + pr > ob.gapY + ob.gap);
            return false;
        }

        // ── Powerups ──────────────────────────────────────────────────────────────
        let powerups = [];
        function spawnPowerup() {
            const e = eraObj;
            const types = ['speed', 'shield', 'double', 'invincible'];
            const t = types[Math.floor(Math.random() * types.length)];
            const gy = GROUND_Y();
            powerups.push({ type: t, x: canvas.width + 40, y: 60 + Math.random() * (gy - 140), w: 20, h: 20, col: e.powerColor, name: e.powerName });
        }
        function updatePowerups() {
            powerups.forEach(p => { p.x -= currentSpeed; });
            powerups = powerups.filter(p => p.x > -40);
        }
        function drawPowerups() {
            powerups.forEach(p => {
                ctx.save();
                const bob = Math.sin(frame * 0.1 + p.x * 0.01) * 4;
                ctx.fillStyle = p.col;
                ctx.shadowColor = p.col;
                ctx.shadowBlur = 15;
                ctx.globalAlpha = 0.8 + 0.2 * Math.sin(frame * 0.15);
                ctx.beginPath();
                ctx.arc(p.x + 10, p.y + 10 + bob, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = `${scaledFont(8)}px "Orbitron", sans-serif`;
                ctx.textAlign = 'center';
                ctx.globalAlpha = 1;
                const label = p.type === 'speed' ? '⚡' : p.type === 'shield' ? '🛡' : p.type === 'double' ? '×2' : '★';
                ctx.fillText(label, p.x + 10, p.y + 14 + bob);
                ctx.restore();
            });
        }
        function checkPowerupCollect() {
            powerups = powerups.filter(p => {
                const dx = player.x - (p.x + 10), dy = player.y - (p.y + 10);
                if (Math.sqrt(dx * dx + dy * dy) < player.r + 14) {
                    if (p.type === 'speed') { player.speedBoost = true; player.speedTimer = 300; }
                    if (p.type === 'shield') { player.shield = true; player.shieldTimer = 600; }
                    if (p.type === 'double') { player.scoreDouble = true; player.doubleTimer = 300; }
                    if (p.type === 'invincible') { player.invincible = true; player.invTimer = 180; }
                    spawnParticles(p.x, p.y, 20, p.col, 'power');
                    powerSound();
                    return false;
                }
                return true;
            });
        }

        // ── HUD (BIG, CLEAR TEXT) ─────────────────────────────────────────────────
        function drawHUD() {
            const e = eraObj;
            ctx.save();

            // Score — top left, BIG
            const scoreFontSize = scaledFont(22);
            ctx.font = `bold ${scoreFontSize}px "Orbitron", sans-serif`;
            ctx.textAlign = 'left';
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 8;
            ctx.fillText('SCORE: ' + Math.floor(score), 20, 40);

            // Lives — top center
            const livesFontSize = scaledFont(18);
            ctx.font = `bold ${livesFontSize}px "Orbitron", sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 10;
            let livesStr = '';
            for (let i = 0; i < 3; i++) livesStr += i < lives ? '♥ ' : '♡ ';
            ctx.fillText(livesStr.trim(), canvas.width / 2, 40);

            // Era progress — top right
            const eraFontSize = scaledFont(16);
            ctx.font = `bold ${eraFontSize}px "Orbitron", sans-serif`;
            ctx.textAlign = 'right';
            ctx.fillStyle = e.glowCol;
            ctx.shadowColor = e.glowCol;
            ctx.shadowBlur = 12;
            const pct = kernelPanic ? '∞' : Math.min(100, Math.floor(score / eraObj.scoreGoal * 100)) + '%';
            ctx.fillText(e.name + '  ' + pct, canvas.width - 20, 40);

            // Progress bar
            const barW = Math.min(300, canvas.width * 0.25);
            const barH = 8;
            const barX = canvas.width - 20 - barW;
            const barY = 50;
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(barX, barY, barW, barH);
            const fill = kernelPanic ? barW : Math.min(barW, (score / eraObj.scoreGoal) * barW);
            ctx.fillStyle = e.glowCol;
            ctx.shadowBlur = 6;
            ctx.fillRect(barX, barY, fill, barH);

            // Powerup status — bottom left
            let py = canvas.height - GROUND_H() - 20;
            const px = 20;
            const statusFont = scaledFont(12);

            if (player.tunneling) {
                ctx.fillStyle = '#ff00ff';
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 10;
                ctx.font = `bold ${statusFont}px "Orbitron", sans-serif`;
                ctx.textAlign = 'left';
                ctx.fillText('⟐ QUANTUM TUNNELING ' + Math.ceil(player.tunnelTimer / 60) + 's', px, py);
                py -= 22;
            } else if (score > 10) {
                ctx.fillStyle = player.tunnelCooldown > 0 ? '#553355' : '#aa00aa';
                ctx.font = `${statusFont}px "Orbitron", sans-serif`;
                ctx.textAlign = 'left';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 6;
                const tunnelStatus = player.tunnelCooldown > 0 ? 'COOLDOWN ' + Math.ceil(player.tunnelCooldown / 60) + 's' : 'READY (5-10s)';
                ctx.fillText('[Q] QUANTUM TUNNEL · ' + tunnelStatus, px, py);
                py -= 22;
            }

            if (player.speedBoost) {
                ctx.fillStyle = eraObj.powerColor;
                ctx.font = `${statusFont}px "Orbitron", sans-serif`;
                ctx.textAlign = 'left';
                ctx.fillText('⚡ SPD ' + Math.ceil(player.speedTimer / 60) + 's', px, py);
                py -= 22;
            }
            if (player.shield) {
                ctx.fillStyle = '#00ffff';
                ctx.font = `${statusFont}px "Orbitron", sans-serif`;
                ctx.textAlign = 'left';
                ctx.fillText('🛡 SHD ' + Math.ceil(player.shieldTimer / 60) + 's', px, py);
                py -= 22;
            }
            if (player.scoreDouble) {
                ctx.fillStyle = '#88ff00';
                ctx.font = `${statusFont}px "Orbitron", sans-serif`;
                ctx.textAlign = 'left';
                ctx.fillText('×2 SCORE ' + Math.ceil(player.doubleTimer / 60) + 's', px, py);
            }

            // Controls hint — bottom right
            ctx.font = `${scaledFont(10)}px "Orbitron", sans-serif`;
            ctx.textAlign = 'right';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 4;
            ctx.fillText('↑↓←→ MOVE   [Q] TUNNEL   [G] ANTIGRAV', canvas.width - 20, canvas.height - GROUND_H() - 10);

            ctx.restore();
        }

        // ── Background Drawing ────────────────────────────────────────────────────
        function drawCoverImage(img, alpha) {
            if (!img || !img.complete || !img.naturalWidth) return;
            ctx.save();
            ctx.globalAlpha = alpha;
            const cw = canvas.width, ch = canvas.height;
            const iw = img.naturalWidth, ih = img.naturalHeight;
            const scale = Math.max(cw / iw, ch / ih);
            const dw = iw * scale, dh = ih * scale;
            const dx = (cw - dw) / 2, dy = (ch - dh) / 2;
            ctx.drawImage(img, dx, dy, dw, dh);
            ctx.restore();
        }

        function drawBackground() {
            const e = eraObj;
            // Solid color fallback
            ctx.fillStyle = e.bgTop;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Image background with dim overlay
            const currentImg = bgImages[era % 8];
            if (bgFading) {
                // Fade from old to new
                drawCoverImage(bgImages[bgFadeFrom], 0.35 * (1 - bgFadeAlpha));
                drawCoverImage(bgImages[bgFadeTo], 0.35 * bgFadeAlpha);
                bgFadeAlpha += 0.02;
                if (bgFadeAlpha >= 1) { bgFading = false; bgFadeAlpha = 1; }
            } else {
                drawCoverImage(currentImg, 0.35);
            }

            // Dark overlay for readability
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            // Ground
            const gy = GROUND_Y(), gh = GROUND_H();
            const gg = ctx.createLinearGradient(0, gy, 0, canvas.height);
            gg.addColorStop(0, e.groundLine);
            gg.addColorStop(0.15, e.groundCol);
            gg.addColorStop(1, '#000');
            ctx.fillStyle = gg;
            ctx.fillRect(0, gy, canvas.width, gh);

            // Ground glow line
            ctx.save();
            ctx.strokeStyle = e.groundLine;
            ctx.shadowColor = e.groundLine;
            ctx.shadowBlur = 16;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(canvas.width, gy); ctx.stroke();
            ctx.restore();

            // Ground scrolling lines
            ctx.save();
            ctx.strokeStyle = e.groundLine;
            ctx.globalAlpha = 0.1;
            ctx.lineWidth = 1;
            const lspace = 60, lox = scrollX % lspace;
            for (let x = -lspace + lox; x < canvas.width + lspace; x += lspace) {
                ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            ctx.restore();
        }

        // ── Title Screen ──────────────────────────────────────────────────────────
        let titleAnim = 0;
        function drawTitleScreen() {
            titleAnim++;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Star field
            ctx.save();
            for (let i = 0; i < 100; i++) {
                const tx = ((i * 373 + titleAnim * 0.3) % canvas.width + canvas.width) % canvas.width;
                const ty = ((i * 571 + titleAnim * 0.1) % canvas.height + canvas.height) % canvas.height;
                const brightness = 0.3 + 0.7 * Math.sin(titleAnim * 0.05 + i);
                ctx.globalAlpha = brightness;
                ctx.fillStyle = '#fff';
                ctx.fillRect(tx, ty, 1.5, 1.5);
            }
            ctx.restore();

            // Title animation
            if (titleAnim > 30) {
                const ta2 = Math.min(1, (titleAnim - 30) / 40);
                const ey = canvas.height * 0.33;

                // Energy burst
                if (titleAnim > 40 && titleAnim < 80) {
                    const burst = (titleAnim - 40) / 40;
                    for (let a = 0; a < Math.PI * 2; a += 0.3) {
                        ctx.save();
                        ctx.globalAlpha = 0.4 * (1 - burst);
                        ctx.strokeStyle = '#ff8800';
                        ctx.shadowColor = '#ff8800';
                        ctx.shadowBlur = 10;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(canvas.width / 2, ey);
                        ctx.lineTo(canvas.width / 2 + Math.cos(a) * burst * 120, ey + Math.sin(a) * burst * 60);
                        ctx.stroke();
                        ctx.restore();
                    }
                }

                // BIT RUNNER title — BIG
                ctx.save();
                ctx.globalAlpha = ta2;
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff6600';
                ctx.shadowBlur = 40 * ta2;
                const fs = Math.min(canvas.width / 8, 80);
                ctx.font = `900 ${fs}px "Orbitron", sans-serif`;
                const grad = ctx.createLinearGradient(0, ey - 60, 0, ey + 30);
                grad.addColorStop(0, '#ffcc00');
                grad.addColorStop(0.5, '#ff6600');
                grad.addColorStop(1, '#ff3300');
                ctx.fillStyle = grad;
                ctx.fillText('BIT RUNNER', canvas.width / 2, ey);

                // Subtitle
                ctx.font = `700 ${Math.min(fs * 0.3, 22)}px "Orbitron", sans-serif`;
                ctx.fillStyle = '#ffaa44';
                ctx.shadowBlur = 10;
                ctx.fillText('THE SOUL OF A COMPUTER', canvas.width / 2, ey + fs * 0.4);
                ctx.restore();
            }

            if (titleAnim > 120) {
                ctx.save();
                ctx.textAlign = 'center';
                const instrFont = scaledFont(16);
                ctx.font = `700 ${instrFont}px "Orbitron", sans-serif`;
                const blink = Math.sin(titleAnim * 0.08) > 0;
                ctx.globalAlpha = blink ? 1 : 0.3;
                ctx.fillStyle = '#ffcc00';
                ctx.shadowColor = '#ffcc00';
                ctx.shadowBlur = 12;
                ctx.fillText('PRESS  ↑  TO BEGIN', canvas.width / 2, canvas.height * 0.58);
                ctx.restore();

                // Controls info
                ctx.save();
                ctx.textAlign = 'center';
                ctx.font = `${scaledFont(11)}px "Orbitron", sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 4;
                ctx.fillText('↑↓←→  MOVE  ·  [Q] QUANTUM TUNNEL  ·  [G] ANTIGRAVITY', canvas.width / 2, canvas.height * 0.64);
                ctx.restore();

                // Era list
                ctx.save();
                ctx.textAlign = 'center';
                const eraListFont = scaledFont(9);
                ctx.font = `${eraListFont}px "Orbitron", sans-serif`;
                ctx.globalAlpha = 0.6;
                ERAS.forEach((e, i) => {
                    ctx.fillStyle = e.glowCol;
                    ctx.shadowColor = e.glowCol;
                    ctx.shadowBlur = 4;
                    ctx.fillText(`ERA ${i + 1}: ${e.name}`, canvas.width / 2, canvas.height * 0.72 + i * (eraListFont + 8));
                });
                ctx.restore();
            }
        }

        // ── Era Transition ────────────────────────────────────────────────────────
        let transitionAlpha = 0;
        function startTransition(nextEra) {
            gameState = 'transition';
            transitionTimer = 0;
            transitionNextEra = nextEra;
            transitionAlpha = 0;
            // Start background fade
            bgFadeFrom = era;
            bgFadeTo = nextEra;
            bgFadeAlpha = 0;
            bgFading = true;
        }
        function updateTransition() {
            transitionTimer++;
            if (transitionTimer < 40) transitionAlpha = transitionTimer / 40;
            else if (transitionTimer === 40) {
                era = transitionNextEra;
                eraObj = ERAS[era];
                obstacles = []; powerups = []; particles = [];
                checkpointReached = false;
                player.init();
                eraSound();
            }
            else if (transitionTimer < 80) transitionAlpha = 1;
            else if (transitionTimer < 120) transitionAlpha = Math.max(0, 1 - (transitionTimer - 80) / 40);
            else { gameState = 'playing'; transitionAlpha = 0; }
        }
        function drawTransition() {
            ctx.save();
            ctx.globalAlpha = transitionAlpha;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (transitionTimer >= 40) {
                const e = ERAS[transitionNextEra] || eraObj;
                ctx.globalAlpha = transitionAlpha * 0.95;
                ctx.textAlign = 'center';
                ctx.fillStyle = e.glowCol;
                ctx.shadowColor = e.glowCol;
                ctx.shadowBlur = 40;

                const enterFont = scaledFont(14);
                ctx.font = `700 ${enterFont}px "Orbitron", sans-serif`;
                ctx.fillText('ENTERING', canvas.width / 2, canvas.height / 2 - 40);

                const eraNameFont = scaledFont(36);
                ctx.font = `900 ${eraNameFont}px "Orbitron", sans-serif`;
                ctx.fillText(e.name, canvas.width / 2, canvas.height / 2 + 15);

                const subFont = scaledFont(12);
                ctx.font = `${subFont}px "Orbitron", sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.shadowBlur = 0;
                ctx.fillText('ERA ' + (transitionNextEra + 1) + ' OF 8', canvas.width / 2, canvas.height / 2 + 50);
            }
            ctx.restore();
        }

        // ── Death Screen ──────────────────────────────────────────────────────────
        let deathScreenTimer = 0;
        function drawDeathOverlay() {
            deathScreenTimer++;
            ctx.save();
            ctx.globalAlpha = Math.min(deathScreenTimer / 30, 0.85);
            ctx.fillStyle = 'rgba(60,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = Math.min(deathScreenTimer / 30, 1);
            ctx.textAlign = 'center';

            const crashFont = scaledFont(28);
            ctx.font = `900 ${crashFont}px "Orbitron", sans-serif`;
            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 30;
            ctx.fillText('SYSTEM CRASH!', canvas.width / 2, canvas.height / 2 - 30);

            const livesFont = scaledFont(14);
            ctx.font = `700 ${livesFont}px "Orbitron", sans-serif`;
            ctx.fillStyle = '#ffaaaa';
            ctx.shadowBlur = 0;
            ctx.fillText('LIVES: ' + lives, canvas.width / 2, canvas.height / 2 + 10);

            if (deathScreenTimer > 60) {
                const blink = Math.sin(deathScreenTimer * 0.1) > 0;
                ctx.globalAlpha = blink ? 1 : 0.4;
                ctx.fillStyle = '#ffcc00';
                ctx.font = `${scaledFont(12)}px "Orbitron", sans-serif`;
                ctx.fillText('PRESS  ↑  TO RESTART', canvas.width / 2, canvas.height / 2 + 45);
            }
            ctx.restore();
        }

        function drawGameOver() {
            const hi = localStorage.getItem('bitrunner_hi') || 0;
            if (score > hi) localStorage.setItem('bitrunner_hi', Math.floor(score));
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.92)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';

            const goFont = scaledFont(34);
            ctx.font = `900 ${goFont}px "Orbitron", sans-serif`;
            ctx.fillStyle = '#ff2222';
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 40;
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);

            const scoreFont = scaledFont(16);
            ctx.font = `700 ${scoreFont}px "Orbitron", sans-serif`;
            ctx.fillStyle = '#ffaa44';
            ctx.shadowBlur = 0;
            ctx.fillText('FINAL SCORE: ' + Math.floor(score), canvas.width / 2, canvas.height / 2);

            ctx.fillStyle = '#bbff00';
            ctx.fillText('HIGH SCORE: ' + Math.floor(Math.max(score, hi)), canvas.width / 2, canvas.height / 2 + 24);

            const restartFont = scaledFont(12);
            ctx.font = `${restartFont}px "Orbitron", sans-serif`;
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.fillText('PRESS  ↑  TO PLAY AGAIN', canvas.width / 2, canvas.height / 2 + 55);
            ctx.restore();
        }

        function drawVictory() {
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.88)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            const hue = (frame * 2) % 360;

            const victFont = scaledFont(28);
            ctx.font = `900 ${victFont}px "Orbitron", sans-serif`;
            ctx.fillStyle = `hsl(${hue},100%,60%)`;
            ctx.shadowColor = `hsl(${hue},100%,60%)`;
            ctx.shadowBlur = 30;
            ctx.fillText('ERA 1-8 COMPLETE!', canvas.width / 2, canvas.height / 2 - 50);

            const sFont = scaledFont(16);
            ctx.font = `700 ${sFont}px "Orbitron", sans-serif`;
            ctx.fillStyle = '#ffdd44';
            ctx.shadowBlur = 0;
            ctx.fillText('SCORE: ' + Math.floor(score), canvas.width / 2, canvas.height / 2 - 10);

            ctx.font = `${scaledFont(11)}px "Orbitron", sans-serif`;
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText('PRESS  ↑  TO PLAY AGAIN', canvas.width / 2, canvas.height / 2 + 22);
            ctx.restore();
        }

        // ── Spawn scheduling ──────────────────────────────────────────────────────
        let nextObstacle = 120, nextPowerup = 300, nextFlyer = 200;
        function scheduleSpawns() {
            if (frame >= nextObstacle) {
                spawnObstacle();
                const sf = currentSpeed ? (6 / currentSpeed) : 1;
                nextObstacle = frame + Math.max(20, Math.floor((80 + Math.random() * 80) * sf));
            }
            if (frame >= nextFlyer) {
                spawnFlyer();
                const sf = currentSpeed ? (6 / currentSpeed) : 1;
                nextFlyer = frame + Math.max(50, Math.floor((120 + Math.random() * 140) * sf));
            }
            if (frame >= nextPowerup) {
                spawnPowerup();
                nextPowerup = frame + 400 + Math.floor(Math.random() * 200);
            }
        }

        // ── Collision check ───────────────────────────────────────────────────────
        function checkCollisions() {
            if (player.invincible || player.dead) return;
            for (const ob of obstacles) {
                if (collides(ob)) {
                    if (player.shield) {
                        player.shield = false;
                        player.shieldTimer = 0;
                        spawnParticles(player.x, player.y, 20, '#00ffff', 'power');
                        return;
                    }
                    triggerDeath();
                    return;
                }
            }
        }
        function triggerDeath() {
            if (player.dead) return;
            player.dead = true;
            lives--;
            spawnParticles(player.x, player.y, 40, eraObj.playerCol, 'power');
            deathSound();
            if (lives <= 0) { deathScreenTimer = 0; setTimeout(() => { gameState = 'gameover'; }, 1800); }
            else { deathScreenTimer = 0; gameState = 'dead'; }
        }

        // ── Input ─────────────────────────────────────────────────────────────────
        const keys = {};
        let arrowJustPressed = false;

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                e.preventDefault();
                arrowJustPressed = true;
            }
            if (e.code === 'KeyG' && !e.repeat) {
                if (era >= 3 && player.agCooldown <= 0 && !player.agActive) {
                    player.agActive = true;
                    player.agTimer = 0;
                    spawnParticles(player.x, player.y, 30, '#ffd700', 'power');
                    powerSound();
                }
            }
            if (e.code === 'KeyQ' && !e.repeat) {
                if (!player.tunneling && score > 10 && player.tunnelCooldown <= 0) {
                    player.tunneling = true;
                    // Random duration between 5-10 seconds (300-600 frames at 60fps)
                    player.tunnelTimer = 300 + Math.floor(Math.random() * 301);
                    spawnParticles(player.x, player.y, 40, '#ff00ff', 'power');
                    powerSound();
                }
            }
        });
        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        // Touch support
        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            arrowJustPressed = true;
        }, { passive: false });
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            keys['ArrowLeft'] = dx < -20;
            keys['ArrowRight'] = dx > 20;
            keys['ArrowUp'] = dy < -20;
            keys['ArrowDown'] = dy > 20;
        }, { passive: false });
        window.addEventListener('touchend', e => {
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
            keys['ArrowUp'] = false;
            keys['ArrowDown'] = false;
        });

        // ── Game init/reset ───────────────────────────────────────────────────────
        function initGame(resetEra) {
            if (resetEra) { era = 0; eraObj = ERAS[0]; score = 0; lives = 3; kernelPanic = false; }
            obstacles = []; powerups = []; particles = [];
            frame = 0; scrollX = 0; nextObstacle = 120; nextPowerup = 300; nextFlyer = 200;
            checkpointReached = false;
            player.init();
        }

        function respawn() {
            player.dead = false;
            player.init();
            obstacles = []; powerups = [];
            nextObstacle = frame + 60; nextPowerup = frame + 300;
        }

        // ── Main loop ─────────────────────────────────────────────────────────────
        function loop() {
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bgHumTimer++;
            if (bgHumTimer > 300 && gameState === 'playing') { bgHumTimer = 0; bgHum(era); }

            if (gameState === 'title') {
                drawTitleScreen();
                if (arrowJustPressed && titleAnim > 120) {
                    gameState = 'playing';
                    initGame(true);
                    if (AC.state === 'suspended') AC.resume();
                }
                arrowJustPressed = false;
                return;
            }

            if (gameState === 'gameover') {
                drawGameOver();
                if (arrowJustPressed) { gameState = 'playing'; lives = 3; initGame(true); }
                arrowJustPressed = false;
                return;
            }

            if (gameState === 'victory') {
                drawVictory();
                if (arrowJustPressed) { gameState = 'playing'; lives = 3; initGame(true); }
                arrowJustPressed = false;
                return;
            }

            if (gameState === 'transition') {
                drawBackground();
                drawObstacles(); drawPowerups(); drawParticles();
                player.draw();
                drawHUD();
                updateTransition();
                drawTransition();
                arrowJustPressed = false;
                return;
            }

            if (gameState === 'dead') {
                drawBackground();
                drawObstacles(); drawPowerups(); drawParticles();
                updateParticles();
                player.draw();
                drawHUD();
                drawDeathOverlay();
                if (arrowJustPressed && deathScreenTimer > 60) { respawn(); gameState = 'playing'; }
                arrowJustPressed = false;
                return;
            }

            // ── PLAYING ───────────────────────────────────────────────────────────
            frame++;

            let dynamicSpeed;
            if (kernelPanic) {
                dynamicSpeed = 24 + (score - eraObj.scoreGoal) * 0.01;
            } else {
                dynamicSpeed = (eraObj.speed + (score / eraObj.scoreGoal) * 3) * 1.8;
            }
            currentSpeed = dynamicSpeed + (player.speedBoost ? 3 : 0);
            scrollX += currentSpeed;

            scheduleSpawns();
            updateObstacles();
            updatePowerups();
            updateParticles();

            player.update();
            checkCollisions();
            checkPowerupCollect();

            // scoring
            const pts = (player.scoreDouble ? 2 : 1);
            score += pts * 0.6;

            // era progression
            if (score >= eraObj.scoreGoal) {
                if (era < ERAS.length - 1) {
                    checkpointSound();
                    startTransition(era + 1);
                } else if (!kernelPanic) {
                    kernelPanic = true;
                    eraObj = Object.assign({}, eraObj);
                    eraObj.name = 'KERNEL PANIC';
                    eraObj.glowCol = '#ff0000';
                    eraObj.bgTop = '#220000';
                    eraObj.groundLine = '#ff0000';
                    spawnParticles(player.x, player.y, 100, '#ff0000', 'power');
                    deathSound();
                }
            }

            // checkpoint flash
            if (!checkpointReached && score >= eraObj.scoreGoal * 0.5 && !kernelPanic) {
                checkpointReached = true;
                checkpointSound();
                spawnParticles(player.x, player.y, 30, eraObj.playerCol, 'power');
            }

            // draw
            ctx.save();
            if (player.tunneling || player.speedBoost) {
                ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
            }
            drawBackground();
            drawObstacles();
            drawPowerups();
            drawParticles();
            player.draw();
            drawHUD();
            ctx.restore();

            // checkpoint label
            if (checkpointReached && frame % 60 < 30) {
                ctx.save();
                ctx.textAlign = 'center';
                ctx.font = `bold ${scaledFont(14)}px "Orbitron", sans-serif`;
                ctx.fillStyle = '#ffcc00';
                ctx.shadowColor = '#ffcc00';
                ctx.shadowBlur = 15;
                ctx.fillText('✓ CHECKPOINT', canvas.width / 2, canvas.height - GROUND_H() - 60);
                ctx.restore();
            }
        }

        // ── Boot ──────────────────────────────────────────────────────────────────
        initGame(true);
        loop();
    </script>
</body>
</html>
